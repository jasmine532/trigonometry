<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>home</title>

<style>

    @font-face {
    font-family: 'vogue';
    src: url('Vogue 3.ttf'), format('ttf');
}

@font-face {
    font-family: 'crimsonpro';
    src: url('CrimsonPro-VariableFont_wght.ttf'), format('ttf');
}


.containera{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

svg{
  width:900px;
  height:500px;
}

/* line style */

line, path{
  stroke: var(--line);
  stroke-width:3;
  fill:none;
}

/* title */

#title{
  font-size:62px;
  fill: var(--title);
  transition:opacity 0.2s linear ;
    font-family: vogue;
}

/* labels initially hidden */

.label{
  font-size:24px;
  opacity:0;
  transition:opacity 0.4s linear 0.2s;
  fill: var(--text);
}

.scroll{
  font-size:17px;
  transition:opacity 0.4s linear;
  fill: var(--subtext);
}

/* hidden triangle line */

#side2{
  stroke-dasharray:700;
  stroke-dashoffset:400;
  transition: all 0.2s linear;
}

/* active state when scrolled */

.scrolled #title{
  opacity:0;
}

.scrolled #side2{
  stroke-dashoffset:0;
}

.scrolled .label{
  opacity:1;
}

.scrolled .scroll{
  opacity:0;
}

/* LIGHT MODE */
html.light {
  --bg: #d4c5aa;
  --text: #a23e17;
  --title:  #d04b18;
  --subtext: #886c5f;
  --line: #812c0b;
  --menu:#d04b18;
}

/* DARK MODE */
html.dark {
  --bg: #1f1f1f;
  --text: #e6e6e6;
  --subtext: #a29476;
  --title: #e6e6e6;
  --line: #dfb24a;
  --menu:#e6e6e6;
}

body{
    background-color: var(--bg);
    margin:0;
    font-family: 'crimsonpro';
    text-align: center;
    height:200vh;
}

/* Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'crimsonpro';
}


/* Layout */
.center {
  height: 100vh;
  display: flex; 
  justify-content: center;
  align-items: center;
}


.top-right {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 16px;
  align-items: center;
}

/* Settings */
.settings-btn {
  background: none;
  border: none;
  font-size: 30px;
  cursor: pointer;
  color: var(--menu);
  transition: 0.4s;
    position: fixed;
  top: 15px;
  right: 66px;

}

/* menu icon */
  .container {
    display: inline-block;
    cursor: pointer;
  }

  .bar1, .bar2, .bar3 {
    width: 25px;
    height: 3.5px;
    background-color: var(--menu);
    margin: 4px 0;
    transition: 0.4s;
  }

  .change .bar1 {
    transform: translate(0, 7.5px) rotate(-45deg);
  }

  .change .bar2 {
    opacity: 0;
  }

  .change .bar3 {
    transform: translate(0, -7.5px) rotate(45deg);
  }

/* Dropdown */
  .dropdown {
    position: relative;
  }

  .dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 50px;
    background-color: var(--bg);
    min-width: 160px;
    z-index: 1;
  }

  .dropdown-content a {
    display: block;
    padding: 12px 5px;
    text-decoration: none;
    color: var(--menu);
    text-align: right;
    font-family: 'crimsonpro';
  }

  .show {
    display: block;
  }

</style>
    <script>
  document.documentElement.classList.add(localStorage.getItem('theme') || 'dark');
</script>
</head>

<body>

<div class="containera">

<svg viewBox="0 0 900 500">

<!-- base -->
<line x1="100" y1="400" x2="800" y2="400"/>

<!-- left side -->
<line x1="100" y1="400" x2="350" y2="120"/>

<!-- animated side -->
<line id="side2" x1="350" y1="120" x2="800" y2="400"/>

<!-- title -->
<text id="title" x="470" y="355" style="font-family:'vogue';">trigonometry</text>

<!-- labels -->
<text class="label" x="370" y="445">hypotenuse</text>

<text class="label" x="190" y="225" transform="rotate(-50 240 260)">
adjacent
</text>

<text class="label" x="545" y="210" transform="rotate(35 540 230)">
opposite
</text>

<text class="label" x="150" y="390">θ</text>

<text class="scroll" x="100" y="500">
scroll to reveal
</text>

<!-- right angle -->
<line class="label" x1="355" y1="155" x2="332" y2="138" />
<line class="label" x1="355" y1="155" x2="373" y2="138" />

</svg>

</div>

<div class="top-right">
  <!-- settings -->
  <button class="settings-btn" onclick="toggleTheme()">⚙</button>

  <!-- menu -->
  <div class="dropdown">
    <div class="container" onclick="toggleMenu(this)">
      <div class="bar1"></div>
      <div class="bar2"></div>
      <div class="bar3"></div>
    </div>

    <div id="myDropdown" class="dropdown-content">
      <a href="index.html">home</a>
      <a href="flashy.html">flashcards</a>
      <a href="ids.html">ids</a>
      <a href="trig.html">practice</a>
    </div>
  </div>
</div>


<script>

window.addEventListener("scroll", () => {

  const trigger = window.scrollY;

  if(trigger > 100){
    document.body.classList.add("scrolled");
  } else {
    document.body.classList.remove("scrolled");
  }

});

  /* Theme Toggle */
function toggleTheme() {
  document.documentElement.classList.toggle("light");
  document.documentElement.classList.toggle("dark");
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}
/* Menu Icon Animation + Dropdown */
function toggleMenu(x) {
  x.classList.toggle("change");
  document.getElementById("myDropdown").classList.toggle("show");
}

/* Close dropdown on outside click */
window.onclick = function(event) {
  if (!event.target.closest('.dropdown')) {
    const dropdown = document.getElementById("myDropdown");
    dropdown.classList.remove("show");
  }
};

</script>

</body>
</html>
